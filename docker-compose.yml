# Sell Online — local stack (unique host ports to avoid clashes with other projects)
#
# Host ports (each service maps to a different port on your machine):
#   PostgreSQL   → localhost:25432  (container :5432)
#   API (Spring) → localhost:28080  (container :8080)
#   ui-admin     → localhost:23000  (container :3000)
#   ui-customer  → localhost:23001  (container :3000)
#
# Usage:
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up --build
#
# From the host, point the UIs at the API:
#   NEXT_PUBLIC_API_URL=http://localhost:28080
#
services:
  postgres:
    image: postgres:16-alpine
    container_name: sell-online-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sell_online}
      POSTGRES_USER: ${POSTGRES_USER:-sell_online}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sell_online}
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    volumes:
      - sell_online_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sell-online-api
    ports:
      - "${API_HOST_PORT:-28080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PORT: "8080"
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sell_online}
      DATABASE_USERNAME: ${POSTGRES_USER:-sell_online}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-sell_online}
      JWT_SECRET: ${JWT_SECRET:-docker-dev-change-me-to-a-secret-at-least-256-bits-long-for-hmac}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:23000,http://localhost:23001}
      # Optional integrations (override in .env.docker)
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
      PAYPAL_RETURN_URL: ${PAYPAL_RETURN_URL:-http://localhost:23001/checkout/success}
      PAYPAL_CANCEL_URL: ${PAYPAL_CANCEL_URL:-http://localhost:23001/checkout/cancelled}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.amazonaws.com}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-sell-online-assets}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dummy}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dummy}
    depends_on:
      postgres:
        condition: service_healthy

  ui-admin:
    build:
      context: .
      dockerfile: apps/ui-admin/Dockerfile
      args:
        NEXT_PUBLIC_CUSTOMER_URL: ${NEXT_PUBLIC_CUSTOMER_URL:-http://localhost:23001}
        NEXT_PUBLIC_PAYPAL_MODE: ${NEXT_PUBLIC_PAYPAL_MODE:-sandbox}
    container_name: sell-online-ui-admin
    ports:
      - "${UI_ADMIN_HOST_PORT:-23000}:3000"
    environment:
      NODE_ENV: production
      # Server-only — proxied to Spring Boot by the BFF route handlers
      API_URL: http://api:8080
      # http://localhost in Docker — do not set Secure on cookies (browser would drop them)
      COOKIE_SECURE: "false"
    depends_on:
      - api

  ui-customer:
    build:
      context: .
      dockerfile: apps/ui-customer/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:28080}
    container_name: sell-online-ui-customer
    ports:
      - "${UI_CUSTOMER_HOST_PORT:-23001}:3000"
    environment:
      NODE_ENV: production
      # Auth.js v5 runtime secrets — never baked into the image
      AUTH_SECRET: ${AUTH_SECRET:-docker-local-dev-secret-min-32-chars-long}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_URL: ${AUTH_URL:-http://localhost:23001}
      AUTH_TRUST_HOST: "true"
    depends_on:
      - api

volumes:
  sell_online_pgdata:
